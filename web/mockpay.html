<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Mock Checkout – TrámiteYA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f7f7f7}
    .wrap{max-width:560px;margin:40px auto;background:#fff;border-radius:14px;padding:20px;
          box-shadow:0 1px 2px rgba(0,0,0,.08)}
    h1{font-size:20px;margin:0 0 8px}
    .muted{color:#64748b;margin:0 0 16px}
    .grid{display:grid;gap:10px}
    .btn{padding:12px;border-radius:10px;border:0;color:#fff;cursor:pointer;font-weight:600}
    .ok{background:#16a34a}.warn{background:#f59e0b}.err{background:#ef4444}.gray{background:#64748b}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Simulador de pago</h1>
    <p class="muted">Estás saliendo de TrámiteYA, simulando Wompi. Selecciona un resultado:</p>
    <div class="grid">
      <button class="btn ok"   onclick="go('success')">✅ Pago exitoso</button>
      <button class="btn warn" onclick="go('insufficient')">⚠️ Saldo insuficiente</button>
      <button class="btn gray" onclick="go('canceled')">❌ Cancelado por usuario</button>
      <button class="btn err"  onclick="go('error')">💥 Error técnico</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get('orderId') || '';
    if (!orderId) alert('Falta orderId en la URL.');

    async function go(scenario){
      document.querySelectorAll('.btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
      try {
        const r = await fetch('/payments_confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, scenario })
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
      } catch (e) { console.error('Mock confirm error:', e); }
      location.replace(`/?orderId=${encodeURIComponent(orderId)}`);
    }
  </script>
</body>
</html>
