<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Retornando del pago (mock)</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:32px;background:#f7f7f7}
    .card{background:#fff;border-radius:14px;padding:16px;max-width:680px;margin:0 auto;box-shadow:0 1px 2px rgba(0,0,0,.08)}
    .muted{color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <h3>Procesando tu pago…</h3>
    <div id="msg" class="muted">Por favor espera…</div>
  </div>


<!-- ...existing code... -->
<script>
(async () => {
  const params     = new URLSearchParams(location.search);
  const scenario   = params.get('scenario');          // usado solo en mock
  const orderIdQS  = params.get('orderId');           // mock
  const txId       = params.get('id') || params.get('transactionId'); // Wompi transactionId
  const reference  = params.get('reference');         // Wompi reference (orderId-<ts>)
  const $msg       = document.getElementById('msg');

  // Detectar entorno (emulador vs deploy)
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const fnBase  = isLocal
    ? `http://${location.hostname}:5001/apptramiteya/us-central1`
    : 'https://us-central1-apptramiteya.cloudfunctions.net';

  function redirectHome(oid) {
    window.location.href = `/?orderId=${encodeURIComponent(oid)}`;
  }

  // 1) Flujo MOCK (mantiene compatibilidad anterior)
  if (scenario) {
    if (!orderIdQS) {
      $msg.textContent = 'Falta orderId (mock).';
      return;
    }
    try {
      const res = await fetch(`${fnBase}/payments_confirm`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ orderId: orderIdQS, scenario })
      });
      const json = await res.json().catch(()=>null);
      if (!res.ok) throw new Error(json?.error || `HTTP ${res.status}`);
      redirectHome(orderIdQS);
    } catch (err) {
      console.error(err);
      $msg.textContent = `Error confirmando pago (mock): ${err}`;
    }
    return;
  }

  // 2) Flujo REAL (Wompi sandbox / prod)
  if (!txId && !reference) {
    $msg.textContent = 'No vienen parámetros de Wompi (id/reference).';
    return;
  }

  try {
    // Preferimos transactionId; si no, usamos reference
    let url = `${fnBase}/payments_confirm?`;
    if (txId) url += `transactionId=${encodeURIComponent(txId)}`;
    else url += `reference=${encodeURIComponent(reference)}`;

    const res  = await fetch(url, { method:'GET' });
    const data = await res.json().catch(()=>null);
    if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);

    // orderId devuelto por backend, si no podemos derivarlo desde reference
    const finalOrderId =
      data?.orderId ||
      (reference ? reference.split('-')[0] : '') ||
      '';

    if (!finalOrderId) {
      $msg.textContent = 'Confirmado pero no se pudo derivar orderId.';
      return;
    }
    redirectHome(finalOrderId);
  } catch (err) {
    console.error(err);
    $msg.textContent = `Error confirmando pago (wompi): ${err}`;
  }
})();
</script>

</body>
</html>
