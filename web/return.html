<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Retornando del pago (mock)</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:32px;background:#f7f7f7}
    .card{background:#fff;border-radius:14px;padding:16px;max-width:680px;margin:0 auto;box-shadow:0 1px 2px rgba(0,0,0,.08)}
    .muted{color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <h3>Procesando tu pago…</h3>
    <div id="msg" class="muted">Por favor espera…</div>
  </div>



<script>
// Si un SW sirvió index.html en vez de return.html, forzar recarga limpia
if (document.querySelector('#app') || document.querySelector('[data-app]')) {
  navigator.serviceWorker.getRegistrations().then(r => r.forEach(sw => sw.unregister()));
  location.reload();
  throw new Error('SW override detected, reloading');
}
</script>
<script>
(async () => {
  // Desregistrar SW para que no interfiera con esta página
  if (navigator.serviceWorker) {
    const regs = await navigator.serviceWorker.getRegistrations().catch(() => []);
    for (const r of regs) await r.unregister().catch(() => {});
  }

  const params    = new URLSearchParams(location.search);
  const scenario  = params.get('scenario');              // mock
  const orderIdQS = params.get('orderId');               // mock
  const txId      = params.get('id') || params.get('transactionId'); // Wompi
  const reference = params.get('reference') || params.get('ref');    // Wompi
  const debug     = params.get('debug');
  const $card     = document.querySelector('.card');

  function msg(t) {
    if (!$card) return;
    let p = $card.querySelector('.rt-msg');
    if (!p) { p = document.createElement('p'); p.className = 'rt-msg'; $card.appendChild(p); }
    p.textContent = t;
  }
  // CAMBIO: propaga id/reference al home para permitir reconfirmación
  function redirectHome(oid) {
    const q = new URLSearchParams({ orderId: oid });
    if (txId)      q.set('id', txId);
    if (reference) q.set('reference', reference);
    if (debug)     q.set('debug', '1');
    location.replace(`/?${q.toString()}`);
  }
  
  async function fetchJSON(url, opts = {}, retries = 2) {
    for (let i = 0; i <= retries; i++) {
      try {
        console.log('[return] fetch', url, 'try', i+1);
        const r = await fetch(url, { method: opts.method || 'GET', headers: { 'Content-Type':'application/json', ...(opts.headers||{}) }, body: opts.body });
        if (r.status === 404) return { __soft404: true }; // permitir fallback
        if (!r.ok) {
          const j = await r.json().catch(()=>null);
          throw new Error(j?.error || `HTTP ${r.status}`);
        }
        return await r.json();
      } catch (e) {
        if (i === retries) throw e;
        await new Promise(res => setTimeout(res, 400*(i+1)));
      }
    }
  }

  // MOCK
  if (scenario) {
    if (!orderIdQS) { msg('Falta orderId (mock).'); return; }
    try {
      await fetchJSON(`/payments_confirm`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ orderId: orderIdQS, scenario })
      });
      redirectHome(orderIdQS);
    } catch (e) { console.error(e); msg(`Error confirmando pago (mock): ${e}`); }
    return;
  }

// ...existing code...
  // ...existing code...
  // REAL (Wompi)
  if (!txId && !reference) { msg('No vienen parámetros de Wompi (id/ref).'); return; }

  try {
    let url = `/payments_confirm?`;
    if (txId) url += `transactionId=${encodeURIComponent(txId)}`;
    if (reference) url += `${url.includes('?') ? '&' : ''}reference=${encodeURIComponent(reference)}`;
    if (debug) url += `&debug=1`;

    let data = await fetchJSON(url);

    if (data && data.__soft404 && reference) {
      await new Promise(r => setTimeout(r, 900));
      data = await fetchJSON(`/payments_confirm?reference=${encodeURIComponent(reference)}${debug ? '&debug=1' : ''}`);
    }

    const finalOrderId =
      data?.orderId ||
      (reference ? reference.split('-')[0] : '') ||
      (data?.reference ? String(data.reference).split('-')[0] : '');

    if (!finalOrderId) { msg('Confirmado pero no se pudo derivar el id de la orden.'); return; }
    redirectHome(finalOrderId);
  } catch (e) {
    const oid = reference ? reference.split('-')[0] : '';
    if (oid) { redirectHome(oid); return; }
    msg(`Error confirmando pago (wompi): ${e}`);
  }
// ...existing code...


})();
</script>

</html>
